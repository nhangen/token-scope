name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions
      - run: bun install
      - run: bun test
      - run: bun tsc --noEmit

  build:
    needs: test-gate
    strategy:
      matrix:
        include:
          - target: bun-macos-arm64
            os: macos-latest
            artifact: token-scope-macos-arm64
          - target: bun-macos-x64
            os: macos-latest
            artifact: token-scope-macos-x64
          - target: bun-linux-x64
            os: ubuntu-22.04
            artifact: token-scope-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions
      - run: bun install
      - run: bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
